databaseChangeLog:

  # ================================================
  # CHANGESET 001 — Tabla principal: citas
  # ================================================
  - changeSet:
      id: "001-create-table-citas"
      author: "hepaq"
      preConditions:
        onFail: MARK_RAN
        not:
          tableExists:
            tableName: citas
      changes:
        - createTable:
            tableName: citas
            remarks: "Tabla de citas médicas — Write Model (Commands)"
            columns:
              - column:
                  name: id
                  type: uniqueidentifier
                  remarks: "Identificador único UUID de la cita"
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: paciente_id
                  type: varchar(20)
                  remarks: "DNI o código del paciente (validado contra RENIEC)"
                  constraints:
                    nullable: false
              - column:
                  name: medico_id
                  type: varchar(50)
                  remarks: "Código del médico asignado (Directorio Médico)"
                  constraints:
                    nullable: false
              - column:
                  name: fecha_hora
                  type: datetime2(0)
                  remarks: "Fecha y hora programada de la cita"
                  constraints:
                    nullable: false
              - column:
                  name: tipo
                  type: varchar(20)
                  remarks: "CONSULTA_MEDICA | LABORATORIO | ECOGRAFIA"
                  constraints:
                    nullable: false
              - column:
                  name: estado
                  type: varchar(20)
                  defaultValue: "PENDIENTE"
                  remarks: "PENDIENTE | CONFIRMADA | CANCELADA | REPROGRAMADA"
                  constraints:
                    nullable: false
              - column:
                  name: motivo_cita
                  type: nvarchar(500)
                  remarks: "Descripción del motivo de la cita"
              - column:
                  name: motivo_cancelacion
                  type: nvarchar(500)
                  remarks: "Motivo de cancelación o reprogramación (nullable)"
              - column:
                  name: fecha_creacion
                  type: datetime2(0)
                  defaultValueComputed: "GETUTCDATE()"
                  remarks: "Timestamp UTC de creación del registro"
                  constraints:
                    nullable: false
              - column:
                  name: fecha_actualizacion
                  type: datetime2(0)
                  defaultValueComputed: "GETUTCDATE()"
                  remarks: "Timestamp UTC de última modificación"
                  constraints:
                    nullable: false
              - column:
                  name: creado_por
                  type: varchar(100)
                  remarks: "Usuario o servicio que creó el registro"
              - column:
                  name: version
                  type: int
                  defaultValueNumeric: 0
                  remarks: "Control de versión optimista (optimistic locking)"
                  constraints:
                    nullable: false

  # ================================================
  # CHANGESET 002 — Índices de rendimiento
  # ================================================
  - changeSet:
      id: "002-indexes-citas"
      author: "hepaq"
      changes:
        - createIndex:
            indexName: idx_citas_paciente_id
            tableName: citas
            columns:
              - column:
                  name: paciente_id

        - createIndex:
            indexName: idx_citas_medico_id
            tableName: citas
            columns:
              - column:
                  name: medico_id

        - createIndex:
            indexName: idx_citas_fecha_hora
            tableName: citas
            columns:
              - column:
                  name: fecha_hora

        - createIndex:
            indexName: idx_citas_estado
            tableName: citas
            columns:
              - column:
                  name: estado

        # Índice compuesto: validar disponibilidad de médico en fecha
        - createIndex:
            indexName: idx_citas_medico_fecha
            tableName: citas
            columns:
              - column:
                  name: medico_id
              - column:
                  name: fecha_hora
              - column:
                  name: estado

        # Índice compuesto: citas activas de un paciente
        - createIndex:
            indexName: idx_citas_paciente_estado
            tableName: citas
            columns:
              - column:
                  name: paciente_id
              - column:
                  name: estado

  # ================================================
  # CHANGESET 003 — Constraints de dominio
  # ================================================
  - changeSet:
      id: "003-constraints-citas"
      author: "hepaq"
      changes:
        - sql:
            sql: |
              ALTER TABLE citas
              ADD CONSTRAINT chk_citas_tipo
              CHECK (tipo IN ('CONSULTA_MEDICA', 'LABORATORIO', 'ECOGRAFIA'));

        - sql:
            sql: |
              ALTER TABLE citas
              ADD CONSTRAINT chk_citas_estado
              CHECK (estado IN ('PENDIENTE', 'CONFIRMADA', 'CANCELADA', 'REPROGRAMADA'));

  # ================================================
  # CHANGESET 004 — Tabla de auditoría
  # ================================================
  - changeSet:
      id: "004-create-table-citas-auditoria"
      author: "hepaq"
      changes:
        - createTable:
            tableName: citas_auditoria
            remarks: "Historial de cambios de estado de las citas"
            columns:
              - column:
                  name: id
                  type: uniqueidentifier
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: cita_id
                  type: uniqueidentifier
                  constraints:
                    nullable: false
              - column:
                  name: estado_anterior
                  type: varchar(20)
              - column:
                  name: estado_nuevo
                  type: varchar(20)
                  constraints:
                    nullable: false
              - column:
                  name: motivo
                  type: nvarchar(500)
              - column:
                  name: usuario_id
                  type: varchar(100)
              - column:
                  name: timestamp
                  type: datetime2(0)
                  defaultValueComputed: "GETUTCDATE()"
                  constraints:
                    nullable: false

        - addForeignKeyConstraint:
            baseTableName: citas_auditoria
            baseColumnNames: cita_id
            constraintName: fk_auditoria_cita_id
            referencedTableName: citas
            referencedColumnNames: id
            onDelete: CASCADE

        - createIndex:
            indexName: idx_citas_auditoria_cita_id
            tableName: citas_auditoria
            columns:
              - column:
                  name: cita_id
